<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Brand Dashboard - Interactive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <h1>Engineering Project Dashboard</h1>
        <input type="text" id="project-search" placeholder="Search for a lab project...">
    </header>

    <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">Assignments</a>
        <a href="#">Contact</a>
    </nav>

    <main class="dashboard-grid">
        <div class="card">
            <h3>Lab 1: HTML Basics</h3>
            <p>Introduction to headings and semantic structure.</p>
        </div>
        <div class="card">
            <h3>Lab 2: CSS Box Model</h3>
            <p>Mastering padding, borders, and margins.</p>
        </div>
        <div class="card">
            <h3>Lab 3: Flexbox Layouts</h3>
            <p>Building responsive grids for modern web apps.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
